
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Clerk Pro By Fazal Ali</title>
  
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#006c4c">
  
  <!-- Apple PWA Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Clerk Pro">
  <link rel="apple-touch-icon" href="/assets/project-logo.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;700&family=Tinos:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- Tailwind CSS & Config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Tinos', 'serif'],
            urdu: ['Noto Nastaliq Urdu', 'serif'],
          },
          colors: {
            primary: 'var(--md-sys-color-primary)',
            'on-primary': 'var(--md-sys-color-on-primary)',
            'primary-container': 'var(--md-sys-color-primary-container)',
            'on-primary-container': 'var(--md-sys-color-on-primary-container)',
            
            secondary: 'var(--md-sys-color-secondary)',
            'on-secondary': 'var(--md-sys-color-on-secondary)',
            'secondary-container': 'var(--md-sys-color-secondary-container)',
            'on-secondary-container': 'var(--md-sys-color-on-secondary-container)',
            
            tertiary: 'var(--md-sys-color-tertiary)',
            'on-tertiary': 'var(--md-sys-color-on-tertiary)',
            'tertiary-container': 'var(--md-sys-color-tertiary-container)',
            'on-tertiary-container': 'var(--md-sys-color-on-tertiary-container)',
            
            error: 'var(--md-sys-color-error)',
            'on-error': 'var(--md-sys-color-on-error)',
            'error-container': 'var(--md-sys-color-error-container)',
            'on-error-container': 'var(--md-sys-color-on-error-container)',
            
            background: 'var(--md-sys-color-background)',
            'on-background': 'var(--md-sys-color-on-background)',
            
            surface: 'var(--md-sys-color-surface)',
            'on-surface': 'var(--md-sys-color-on-surface)',
            'surface-variant': 'var(--md-sys-color-surface-variant)',
            'on-surface-variant': 'var(--md-sys-color-on-surface-variant)',
            'surface-container-low': 'var(--md-sys-color-surface-container-low)',
            'surface-container': 'var(--md-sys-color-surface-container)',
            'surface-container-high': 'var(--md-sys-color-surface-container-high)',
            
            outline: 'var(--md-sys-color-outline)',
            'outline-variant': 'var(--md-sys-color-outline-variant)',
          },
          boxShadow: {
            'elevation-1': '0px 1px 2px 0px rgba(0,0,0,0.3), 0px 1px 3px 1px rgba(0,0,0,0.15)',
            'elevation-2': '0px 1px 2px 0px rgba(0,0,0,0.3), 0px 2px 6px 2px rgba(0,0,0,0.15)',
            'elevation-3': '0px 4px 8px 3px rgba(0,0,0,0.15), 0px 1px 3px 0px rgba(0,0,0,0.3)',
            'elevation-4': '0px 6px 10px 4px rgba(0,0,0,0.15), 0px 2px 3px 0px rgba(0,0,0,0.3)',
          },
          borderRadius: {
            'xl': '16px', 
            '2xl': '24px', 
            '3xl': '28px', 
          }
        }
      }
    }
  </script>
  <style>
    :root {
      /* Light Mode - Emerald Based */
      --md-sys-color-primary: #006c4c;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-primary-container: #89f8c7;
      --md-sys-color-on-primary-container: #002114;
      
      --md-sys-color-secondary: #4d6357;
      --md-sys-color-on-secondary: #ffffff;
      --md-sys-color-secondary-container: #d0e8d8;
      --md-sys-color-on-secondary-container: #0b1f16;
      
      --md-sys-color-tertiary: #3d6472;
      --md-sys-color-on-tertiary: #ffffff;
      --md-sys-color-tertiary-container: #c1e9fa;
      --md-sys-color-on-tertiary-container: #001f28;
      
      --md-sys-color-error: #ba1a1a;
      --md-sys-color-on-error: #ffffff;
      --md-sys-color-error-container: #ffdad6;
      --md-sys-color-on-error-container: #410002;
      
      --md-sys-color-background: #fbfdf9;
      --md-sys-color-on-background: #191c1a;
      
      --md-sys-color-surface: #fbfdf9;
      --md-sys-color-on-surface: #191c1a;
      --md-sys-color-surface-variant: #dbe5dd;
      --md-sys-color-on-surface-variant: #404943;
      
      --md-sys-color-surface-container-low: #f5fbf7;
      --md-sys-color-surface-container: #eff5f1;
      --md-sys-color-surface-container-high: #e9efeb;
      
      --md-sys-color-outline: #707973;
      --md-sys-color-outline-variant: #bfc9c1;
    }

    .dark {
      /* Dark Mode */
      --md-sys-color-primary: #6cdbac;
      --md-sys-color-on-primary: #003825;
      --md-sys-color-primary-container: #005138;
      --md-sys-color-on-primary-container: #89f8c7;
      
      --md-sys-color-secondary: #b4ccbc;
      --md-sys-color-on-secondary: #1f352a;
      --md-sys-color-secondary-container: #364b40;
      --md-sys-color-on-secondary-container: #d0e8d8;
      
      --md-sys-color-tertiary: #a5cce2;
      --md-sys-color-on-tertiary: #073542;
      --md-sys-color-tertiary-container: #244c5a;
      --md-sys-color-on-tertiary-container: #c1e9fa;
      
      --md-sys-color-error: #ffb4ab;
      --md-sys-color-on-error: #690005;
      --md-sys-color-error-container: #93000a;
      --md-sys-color-on-error-container: #ffdad6;
      
      --md-sys-color-background: #191c1a;
      --md-sys-color-on-background: #e1e3df;
      
      --md-sys-color-surface: #111412;
      --md-sys-color-on-surface: #e1e3df;
      --md-sys-color-surface-variant: #404943;
      --md-sys-color-on-surface-variant: #bfc9c1;
      
      --md-sys-color-surface-container-low: #191c1a;
      --md-sys-color-surface-container: #1d201e;
      --md-sys-color-surface-container-high: #282b28;
      
      --md-sys-color-outline: #8a938c;
      --md-sys-color-outline-variant: #404943;
    }

    body { font-family: 'Inter', sans-serif; background-color: var(--md-sys-color-background); color: var(--md-sys-color-on-background); transition: background-color 0.3s, color 0.3s; }
    .font-official { font-family: 'Tinos', serif; }
    
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    .material-symbols-outlined.filled {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* --- CRITICAL PRINT STYLES --- */
    @page { size: A4; margin: 0; }
    @media print {
      .no-print, .splash-root, .splash-overlay, nav, header, .fab, .toast-container { 
        display: none !important; 
      }
      
      html, body, #root { 
        margin: 0 !important; 
        padding: 0 !important; 
        background: white !important; 
        color: black !important; 
      }

      .print-page { 
        box-shadow: none !important; 
        margin: 0 !important;
        width: 210mm !important;
        height: 297mm !important;
        overflow: hidden !important;
        page-break-after: always !important; 
        position: relative !important;
      }
      
      .print-break {
        page-break-before: always !important;
        height: 0;
        width: 0;
      }
      
      * { 
        -webkit-print-color-adjust: exact !important; 
        print-color-adjust: exact !important; 
      }
    }

    @keyframes heartPulse {
      0% { transform: scale(1); }
      14% { transform: scale(1.15); }
      28% { transform: scale(1); }
      42% { transform: scale(1.15); }
      70% { transform: scale(1); }
    }
    .heart-pulse {
      display: inline-block;
      color: var(--md-sys-color-error);
      animation: heartPulse 2s infinite ease-in-out;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "date-fns": "https://esm.sh/date-fns@^4.1.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.0.0",
    "clsx": "https://esm.sh/clsx@^2.1.0",
    "tailwind-merge": "https://esm.sh/tailwind-merge@^2.2.0",
    "pdf-lib": "https://esm.sh/pdf-lib@^1.17.1",
    "pdfjs-dist": "https://esm.sh/pdfjs-dist@3.11.174",
    "pdfjs-dist/": "https://esm.sh/pdfjs-dist@3.11.174/"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
<script type="module" src="/src/index.tsx"></script>
</body>
</html>
